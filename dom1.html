<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JS DOM</title>
</head>

<body>
    <h1>JavaScript HTML DOM</h1>
    <h2>The getElementById() Method</h2>

    <p id="demo"></p>

    <script>
        // Access a paragraph Element
        let myPara = document.getElementById("demo");

        // Change the content of the Element
        myPara.innerHTML = "<b>Hello World!</b>";
    </script>

</body>

</html>
