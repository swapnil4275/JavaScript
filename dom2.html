<!-- Demonstrate DOM  -->

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JS Dom</title>
</head>

<body>

    <p id="demo1">Hello All Of You.</p>
    <button onclick="myfunction()">Click here..!</button>


    <script>

        function myfunction() {

            document.getElementById("demo1").innerHTML = "Text Changed..!";
        }

    </script>

</body>

</html>
